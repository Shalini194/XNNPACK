name: Execute Windows and Linux (x86,x64) Tests with Intel SDE

env:
  SDE_WINDOWS_URL: https://downloadmirror.intel.com/831748/sde-external-9.44.0-2024-08-22-win.tar.xz
  SDE_WINDOWS_FILENAME: sde-external-9.44.0-2024-08-22-win.tar.xz
  SDE_LINUX_URL: https://downloadmirror.intel.com/831748/sde-external-9.44.0-2024-08-22-lin.tar.xz
  SDE_LINUX_FILENAME: sde-external-9.44.0-2024-08-22-linux.tar.xz
  SDE_PATH: ""

on:
  workflow_dispatch:

jobs:
  build:
    uses: ./.github/workflows/windows-and-linux-build.yml

  test-sde:
    strategy:
      matrix:
        architecture: [windows-x86, windows-x64, linux-x86_64]
        sde-processor:
          [
            -skl,
            -cnl,
            -icl,
            -skx,
            -clx,
            -cpx,
            -icx,
            -tgl,
            -adl,
            -mtl,
            -rpl,
            -spr,
            -emr,
            -gnr,
            -srf,
            -arl,
            -lnl,
          ]

    runs-on: ${{ matrix.architecture == 'linux-x86_64' && 'ubuntu-latest' || 'windows-latest' }}
    needs: build
    timeout-minutes: 60
    continue-on-error: true

    steps:
      - name: Download Build Artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-artifacts-${{ matrix.architecture }}
          path: build/${{ matrix.architecture }}/

      - name: Download Intel SDE
        run: |
          if [ "${{ matrix.architecture }}" == "linux-x86_64" ]; then
            echo "Downloading Linux Intel SDE"
            wget ${{ env.SDE_LINUX_URL }}
            tar -xf ${{ env.SDE_LINUX_FILENAME }}

          elif [[ "${{ matrix.architecture }}" == "windows-x86" || "${{ matrix.architecture }}" == "windows-x64" ]]; then
            echo "Downloading Windows Intel SDE"
            curl -LO ${{ env.SDE_WINDOWS_URL }}
            tar -xf ${{ env.SDE_WINDOWS_FILENAME }}

          fi
        shell: ${{ matrix.architecture == 'linux' && 'bash' || 'pwsh' }}

      - name: Set SDE PATH
        run: |
          if [ "${{ matrix.architecture }}" == "linux-x86_64" ]; then
            $ {{ env.SDE_PATH }} ="${{ github.workspace }}/${{ env.SDE_LINUX_FILENAME%.tar.xz }}/sde"  
            echo "SDE_PATH set to: $ {{ env.SDE_PATH }}"

          elif [[ "${{ matrix.architecture }}" == "windows-x86" || "${{ matrix.architecture }}" == "windows-x64" ]]; then
            $ {{ env.SDE_PATH }}="${{ github.workspace }}\\${{ env.SDE_WINDOWS_FILENAME%.tar.xz }}\\sde.exe" 
            echo "SDE_PATH set to: $ {{ env.SDE_PATH }}"
            
          fi
        shell: bash

      - name: Run tests using Intel SDE
        run: |
          ${{ env.SDE_PATH }} ${{ matrix.sde-processor }} -- ctest -C Release --parallel $Env:NUMBER_OF_PROCESSORS
        working-directory: ${{ github.workspace }}/build/${{ matrix.architecture }}

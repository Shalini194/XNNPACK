name: Test Latest Push

on:
  push:
    branches-ignore:
      - master
  workflow_dispatch:
    inputs:
      run-tests:
        description: "Whether to also run unit tests where possible."
        default: true
        required: false
        type: boolean
      update-caches:
        description: "Whether to update the `ccache` or `bazel` caches, where possible."
        default: false
        required: false
        type: boolean
      sde-processor:
        description: "Pick a SDE CPU Processor to run tests"
        required: true
        type: choice
        default: "ALL"
        options:
          - ALL
          - Skylake (Supports SSE, SSE2, SSE3, SSE41, AVX, F16C, FMA3, AVX2)
          - Cannon Lake
          - Ice Lake
          - SkyLake server
          - Cascade Lake 
          - Cooper Lake
          - Ice Lake server
          - Tiger Lake
          - Alder Lake
          - Meteor Lake
          - Raptor Lake
          - Sapphire Rapids
          - Emerald Rapids
          - Granite Rapids
          - Sierra Forest
          - Arrow Lake
          - Lunar Lake

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - name: Setup ccache
        uses: hendrikmuhs/ccache-action@v1.2
        with:
          key: ${{ github.job }}
          max-size: "500M"
          save: ${{ inputs.update-caches }}
      - name: Install Ninja
        uses: seanmiddleditch/gha-setup-ninja@master
      - name: Setup build environment
        shell: bash
        run: |
          echo "VCVARSALL=$(vswhere -products \* -latest -property installationPath)\\VC\\Auxiliary\\Build\\vcvarsall.bat" >> $GITHUB_ENV
      - name: Configure and build
        run: scripts/build-windows-x64.cmd
        shell: cmd
        working-directory: ${{ github.workspace }}
        env:
          CFLAGS: "/UNDEBUG"
          CXXFLAGS: "/UNDEBUG"
      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v3
        with:
          name: build-artifacts
          path: build/windows/x64/      

  test-sde-skl:
    needs: build
    runs-on: windows-latest
    if: ${{ inputs.sde-processor == 'Skylake (Supports SSE, SSE2, SSE3, SSE41, AVX, F16C, FMA3, AVX2)' || inputs.sde-processor == 'ALL' }}
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - name: Download Build Artifacts
        uses: actions/download-artifact@v3
        with:
          name: build-artifacts
          path: build/windows/x64/
      - name: Download Intel SDE using curl
        run: |
          curl -L -o sde-external-9.44.0-2024-08-22-win.tar.xz https://downloadmirror.intel.com/831748/sde-external-9.44.0-2024-08-22-win.tar.xz
      - name: Extract Intel SDE
        shell: bash
        run: |
          tar -xf sde-external-9.44.0-2024-08-22-win.tar.xz
      - name: Run tests using Intel SDE Skylake Processor
        if: ${{ inputs.run-tests }}
        run: |
          ${{ github.workspace }}\sde-external-9.44.0-2024-08-22-win\sde.exe -skl -- ctest -C Release --parallel $Env:NUMBER_OF_PROCESSORS
        working-directory: ${{ github.workspace }}/build/windows/x64

  build-and-test-sde-cnl:
    runs-on: windows-latest
    if: ${{ inputs.sde-processor == 'Cannon Lake' || inputs.sde-processor == 'ALL' }}
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - name: Download Build Artifacts
        uses: actions/download-artifact@v3
        with:
          name: build-artifacts
          path: build/windows/x64/
      - name: Download Intel SDE using curl
        run: |
          curl -L -o sde-external-9.44.0-2024-08-22-win.tar.xz https://downloadmirror.intel.com/831748/sde-external-9.44.0-2024-08-22-win.tar.xz
      - name: Extract Intel SDE
        shell: bash
        run: |
          tar -xf sde-external-9.44.0-2024-08-22-win.tar.xz
      - name: Run tests using Intel SDE Cannon Lake Processor
        if: ${{ inputs.run-tests }}
        run: |
          ${{ github.workspace }}\sde-external-9.44.0-2024-08-22-win\sde.exe -cnl -- ctest -C Release --parallel $Env:NUMBER_OF_PROCESSORS
        working-directory: ${{ github.workspace }}/build/windows/x64


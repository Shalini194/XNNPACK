name: Test Latest Push

on:
  push:
    branches-ignore:
      - master
  workflow_dispatch:
    inputs:
      sde-processors:
        description: 'Pick a SDE Processors'
        required: true
        default: 'ALL'  # Optionally set a default value

jobs:  
  build-and-test-sde:
    uses: ./.github/workflows/run-sde_all.yml
    with:
      sde-processors: ${{ inputs.sde-processors }}
    if: ${{ inputs.sde-processors == 'ALL' }}

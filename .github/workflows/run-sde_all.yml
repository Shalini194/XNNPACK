name: Run SDE for ALL Architectures

on:
  workflow_call:
    inputs:
      run-tests:
        description: 'Whether to also run unit tests where possible.'
        default: true
        required: false
        type: boolean
      update-caches:
        description: 'Whether to update the `ccache` or `bazel` caches, where possible.'
        default: false
        required: false
        type: boolean
      sde-processors:
        description: 'Pick a SDE Processors'
        required: true
        type: string

jobs:
  setup-sde:
    runs-on: windows-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - name: Setup ccache
        uses: hendrikmuhs/ccache-action@v1.2
        with:
          key: ${{ github.job }}
          max-size: "500M"
          save: ${{ inputs.update-caches }}
      - name: Install Ninja
        uses: seanmiddleditch/gha-setup-ninja@master
      - name: Setup build environment
        shell: bash
        run: |
          echo "VCVARSALL=$(vswhere -products \* -latest -property installationPath)\\VC\\Auxiliary\\Build\\vcvarsall.bat" >> $GITHUB_ENV
      - name: Configure and build
        run: scripts/build-windows-x64.cmd
        shell: cmd
        working-directory: ${{ github.workspace }}
        env:
          CFLAGS: "/UNDEBUG"
          CXXFLAGS: "/UNDEBUG"
      - name: Download SDE using curl 
        run: |
          curl -L -o sde-external-9.44.0-2024-08-22-win.tar.xz https://downloadmirror.intel.com/831748/sde-external-9.44.0-2024-08-22-win.tar.xz
      - name: Show current directory before extraction
        shell: bash
        run: |
          pwd
          ls -lah
      - name: Extract SDE
        shell: bash
        run: |
          tar -xf sde-external-9.44.0-2024-08-22-win.tar.xz      
  
  build-sde-skl:
    runs-on: windows-latest
    needs: setup-sde  # This job depends on the setup-sde job
    steps:
      - name: Run SDE for SKL
        run: |
          ${{ github.workspace }}/sde-external-9.44.0-2024-08-22-win/sde.exe -- -skl ctest -C Release --parallel $Env:NUMBER_OF_PROCESSORS
  
  build-sde-cnl:
    runs-on: windows-latest
    needs: setup-sde  # This job depends on the setup-sde job
    steps:
      - name: Run SDE for CNL
        run: |
          ${{ github.workspace }}/sde-external-9.44.0-2024-08-22-win/sde.exe -- -cnl ctest -C Release --parallel $Env:NUMBER_OF_PROCESSORS
